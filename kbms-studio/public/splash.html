<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>KBMS Studio Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #1e293b;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            -webkit-app-region: drag;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease-out;
        }

        .logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 24px -6px rgba(16, 185, 129, 0.3);
            margin-bottom: 24px;
            position: relative;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 900;
            color: white;
            letter-spacing: -1px;
        }

        .app-name {
            font-size: 22px;
            font-weight: 800;
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
            color: #0f172a;
        }

        .app-tagline {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            margin: 0 0 32px 0;
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }

        .loader {
            width: 160px;
            height: 3px;
            background: #f1f5f9;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .loader-bar {
            width: 30%;
            height: 100%;
            background: #10b981;
            border-radius: 10px;
            position: absolute;
            animation: loading 1.8s infinite cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes loading {
            0% { left: -30%; width: 30%; }
            50% { left: 35%; width: 40%; }
            100% { left: 100%; width: 30%; }
        }

        .version {
            position: absolute;
            bottom: 32px;
            font-size: 10px;
            font-weight: 700;
            color: #cbd5e1;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="logo-text">K</span>
        </div>
        <h1 class="app-name">KBMS Studio</h1>
        <p class="app-tagline">Data Intelligence</p>
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
    </div>
    <div class="version">V3.1.0 Stable Build</div>
</body>
</html>
