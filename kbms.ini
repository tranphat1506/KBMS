[Server]
; Network settings
host=127.0.0.1
port=3307

; Path to database files (supports relative ./data or absolute paths)
data_dir=./data

; Operational Limits
max_connections=100

; System Version
version=3.4.0-stable

; Security settings: This key is used for AES-256 disk encryption.
; Changing this key on an existing database will make it unreadable!
master_key=KBMS_V3_MASTER_SECRET_2026

[Root]
; Default system administrator credentials
username=root
password=root

[Settings]
; Custom system settings to apply at startup
; Note: PageSize cannot be changed here as it would corrupt data.
default_timeout=60
enable_audit_logs=true
